name: project_ci_cd_work_flow

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean install

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: egokirill/spring-github-action:latest

  deploy-simulation:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Pull Docker image
        run: docker pull egokirill/spring-github-action:latest

      - name: Run container
        run: docker run -d -p 8080:8080 --name app egokirill/spring-github-action:latest

      - name: Wait for app
        run: sleep 10

      - name: Check health endpoint
        run: curl http://localhost:8080/